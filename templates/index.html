<!DOCTYPE html>
<html>
<head>
<title>AI Insurance Policy Recommendation</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:40px;
    width:380px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:25px;
}

input{
    width:90%;
    padding:10px;
    margin:8px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:10px 20px;
    background:linear-gradient(135deg,#4CAF50,#2E7D32);
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#result{
    margin-top:20px;
}

.explanation-box{
    background:#f5f5f5;
    padding:10px;
    border-radius:6px;
    margin-top:10px;
}

.error{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>AI Insurance Policy Recommendation</h2>

<form id="insuranceForm">

<input type="number" name="age" placeholder="Age" required>

<input type="number" name="income" placeholder="Income" required>

<input type="number" name="bmi" placeholder="BMI" required>

<input type="number" name="smoker" placeholder="Smoker (0 or 1)" required>

<br><br>

<button type="submit">Get Recommendation</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("insuranceForm").addEventListener("submit", function(e){

e.preventDefault();

const age = document.querySelector("input[name='age']").value;
const income = document.querySelector("input[name='income']").value;
const bmi = document.querySelector("input[name='bmi']").value;
const smoker = document.querySelector("input[name='smoker']").value;

fetch("/api/predict",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
age:parseInt(age),
income:parseInt(income),
bmi:parseFloat(bmi),
smoker:parseInt(smoker)
})

})

.then(response => response.json())

.then(data =>{

// Handle backend validation error
if(data.error){

document.getElementById("result").innerHTML = `
<p class="error">⚠ ${data.error}</p>
`;

return;

}

document.getElementById("result").innerHTML = `

<h3 style="color:green;">
Recommended Policy: ${data.recommended_policy}
</h3>

<p><strong>Risk Score:</strong> ₹${data.risk_score}</p>

<div class="explanation-box">
<strong>Explanation:</strong> ${data.explanation}
</div>

`;

})

.catch(error =>{

document.getElementById("result").innerHTML = `
<p class="error">Server Error. Please try again.</p>
`;

});

});

</script>

</body>
</html>
