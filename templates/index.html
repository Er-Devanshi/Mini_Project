<!DOCTYPE html>
<html>
<head>
    <title>AI Insurance Recommendation</title>
    <style>
        body { font-family: Arial; background-color: #f4f6f9; text-align: center; }
        .box { background: white; padding: 20px; width: 400px; margin: auto; margin-top: 50px; border-radius: 10px; box-shadow: 0 0 10px gray; }
        input { margin: 5px; padding: 8px; width: 90%; }
        button { padding: 8px 15px; background: blue; color: white; border: none; border-radius: 5px; }
        h3 { color: green; }
    </style>
</head>
<body>

<div class="box">
    <h2>AI Insurance Policy Recommendation</h2>

    <form method="POST">
        <input type="number" name="age" placeholder="Age" required><br>
        <input type="number" name="income" placeholder="Income" required><br>
        <input type="number" step="0.1" name="bmi" placeholder="BMI" required><br>
        <input type="number" name="smoker" placeholder="Smoker (0 or 1)" required><br>
        <button type="submit">Get Recommendation</button>
    </form>

    {% if policy %}
        <h3>Recommended Policy: {{ policy }}</h3>
        <p>Predicted Claim Risk: ₹{{ risk_score }}</p>
        <p>Risk Percentage: {{ risk_percent }}%</p>
    {% endif %}
</div>

</body>
</html>
