<!DOCTYPE html>
<html>
<head>
    <title>AI Insurance Advisor</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        .hidden {
            display: none;
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #f9f9f9;
            text-align: left;
        }

        ul {
            padding-left: 18px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- 🔹 PAGE 1 (NAME) -->
    <div id="page1">
        <h2>AI Insurance Advisor</h2>
        <input type="text" id="name" placeholder="Enter your name">
        <button onclick="startApp()">Continue</button>
    </div>

    <!-- 🔹 PAGE 2 (FORM) -->
    <div id="page2" class="hidden">

        <h3 id="greeting"></h3>

        <form id="form">
            <input type="number" id="age" placeholder="Age" required>
            <input type="number" id="income" placeholder="Income" required>
            <input type="number" id="bmi" placeholder="BMI" required>
            <input type="number" id="smoker" placeholder="Smoker (0 or 1)" required>

            <button>Get Recommendation</button>
        </form>

        <div id="result"></div>

    </div>

</div>

<script>

// 🔥 Start App
function startApp(){
    let name = document.getElementById("name").value;

    let hour = new Date().getHours();
    let greet = "Hello";

    if(hour < 12) greet = "Good Morning";
    else if(hour < 18) greet = "Good Afternoon";
    else greet = "Good Evening";

    document.getElementById("greeting").innerText = `${greet}, ${name} 👋`;

    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
}


// 🔥 Form Submit
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    fetch("/api/predict", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            age: age.value,
            income: income.value,
            bmi: bmi.value,
            smoker: smoker.value
        })
    })
    .then(res=>res.json())
    .then(data=>{

        let riskLevel="", color="";

        if(data.risk_score < 30000){
            riskLevel="Low Risk"; color="green";
        } else if(data.risk_score < 60000){
            riskLevel="Medium Risk"; color="orange";
        } else {
            riskLevel="High Risk"; color="red";
        }

        document.getElementById("result").innerHTML = `
        <div class="result-box">

        <h3>${data.recommended_policy}</h3>

        <p><b>Risk Score:</b> ₹${data.risk_score}</p>

        <p><b>Risk Level:</b> 
        <span style="background:${color};color:white;padding:5px;border-radius:5px;">
        ${riskLevel}
        </span></p>

        <!-- Meter -->
        <div style="background:#ddd;border-radius:10px;">
            <div style="width:${Math.min(data.risk_score/1000,100)}%;
                        background:${color};
                        height:10px;"></div>
        </div>

        <p><b>Explanation:</b> ${data.explanation}</p>

        <h4>Policy Benefits:</h4>
        <ul>${data.benefits.map(b=>`<li>${b}</li>`).join("")}</ul>

        <h4>Suggestions:</h4>
        <ul>${data.suggestions.map(s=>`<li>${s}</li>`).join("")}</ul>

        </div>
        `;

    });

});

</script>

</body>
</html>
