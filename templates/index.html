<!DOCTYPE html>
<html>

<head>
<title>AI Insurance Policy Recommendation</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#6a11cb,#2575fc);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.explanation-box{
margin-top:10px;
background:#f1f1f1;
padding:10px;
border-radius:5px;
}

ul{
text-align:left;
}

/* Risk Meter */

.meter{
height:20px;
background:#ddd;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.meter-fill{
height:100%;
background:linear-gradient(90deg,green,orange,red);
width:0%;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Insurance Policy Recommendation</h2>

<form id="insuranceForm">

<input type="number" id="age" placeholder="Age" required>

<input type="number" id="income" placeholder="Income" required>

<input type="number" id="bmi" placeholder="BMI" required>

<input type="number" id="smoker" placeholder="Smoker (0 or 1)" required>

<button type="submit">Get Recommendation</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("insuranceForm").addEventListener("submit", function(e){

e.preventDefault()

let age = document.getElementById("age").value
let income = document.getElementById("income").value
let bmi = document.getElementById("bmi").value
let smoker = document.getElementById("smoker").value

fetch("/api/predict",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

age:parseInt(age),
income:parseFloat(income),
bmi:parseFloat(bmi),
smoker:parseInt(smoker)

})

})

.then(response=>response.json())

.then(data=>{

let riskLevel=""
let riskColor=""

if(data.risk_score < 20000){
riskLevel="Low Risk"
riskColor="green"
}
else if(data.risk_score < 50000){
riskLevel="Moderate Risk"
riskColor="orange"
}
else{
riskLevel="High Risk"
riskColor="red"
}

/* Risk meter percentage */
let meterValue = Math.min(data.risk_score / 1000,100)

document.getElementById("result").innerHTML = `

<h3 style="color:green;">
Recommended Policy: ${data.recommended_policy}
</h3>

<p><strong>Risk Score:</strong> ₹${data.risk_score}</p>

<p><strong>Risk Level:</strong> 
<span style="color:${riskColor};">${riskLevel}</span>
</p>

<h4>Risk Meter</h4>

<div class="meter">
<div class="meter-fill" style="width:${meterValue}%"></div>
</div>

<h4>Policy Benefits</h4>

<ul>
${data.benefits.map(b => `<li>${b}</li>`).join("")}
</ul>

<h4>Customer Profile</h4>

<ul>
<li>Age: ${age}</li>
<li>Income: ₹${income}</li>
<li>BMI: ${bmi}</li>
<li>Smoker: ${smoker == 1 ? "Yes" : "No"}</li>
</ul>

<div class="explanation-box">
<strong>Explanation:</strong> ${data.explanation}
</div>

`

})

.catch(error=>{

document.getElementById("result").innerHTML =
"<p style='color:red;'>Error getting recommendation</p>"

})

})

</script>

</body>

</html>
