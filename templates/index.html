<!DOCTYPE html>
<html>
<head>
    <title>AI Insurance Advisor</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #f5f5f5;
}

.box {
    background: white;
    border-radius: 12px;
    padding: 30px;

    width: 80%;        /* increase width */
    max-width: 900px; /* control max size */
    margin: auto;     /* center it */

    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

#result {
    margin-top: 20px;
}

.error {
    color: red;
    font-weight: bold;
}

.explanation-box {
    background: #f1f1f1;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
}

/* ✅ Risk Graph Styles */
.risk-bar-container {
    width: 100%;
    background: #eee;
    border-radius: 10px;
    margin-top: 10px;
}

.risk-bar {
    height: 10px;
    border-radius: 10px;
    width: 0%;
    background: #4CAF50;
    transition: width 0.5s ease;
}
</style>

</head>

<body>

<div class="box">
    <p style="text-align:center; opacity:0.7;">AI Powered Insurance Advisor</p>

<h2>AI Insurance Policy Recommendation</h2>

<form id="insuranceForm">

<input type="number" name="age" placeholder="Age" required>
<input type="number" name="income" placeholder="Income" required>
<input type="number" name="bmi" placeholder="BMI" required>
<input type="number" name="smoker" placeholder="Smoker (0 or 1)" required>

<br><br>

<button type="submit">Get Recommendation</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("insuranceForm").addEventListener("submit", function(e){

e.preventDefault();

const age = document.querySelector("input[name='age']").value;
const income = document.querySelector("input[name='income']").value;
const bmi = document.querySelector("input[name='bmi']").value;
const smoker = document.querySelector("input[name='smoker']").value;

fetch("/api/predict",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
age:parseInt(age),
income:parseInt(income),
bmi:parseFloat(bmi),
smoker:parseInt(smoker)
})

})

.then(response => response.json())

.then(data =>{

if(data.error){
document.getElementById("result").innerHTML = `
<p class="error">⚠ ${data.error}</p>
`;
return;
}

/* ✅ Calculate percentage for graph */
let riskPercent = data.risk_score / 500;  // adjust if needed
if (riskPercent > 100) riskPercent = 100;

document.getElementById("result").innerHTML = `

<h3 style="color:green;">
🥇 Recommended: ${data.recommended_policy}
</h3>

<p><strong>Other Options:</strong></p>
<ul>
    <li>🥈 ${data.all_policies[1]}</li>
    <li>🥉 ${data.all_policies[2]}</li>
    <li>⭐ ${data.all_policies[3]}</li>
</ul>

<p><strong>Risk Score:</strong> ₹${data.risk_score}</p>

<!-- ✅ RISK GRAPH ADDED -->
<div class="risk-bar-container">
    <div class="risk-bar" style="width:${riskPercent}%"></div>
</div>

<div class="explanation-box">
<strong>Explanation:</strong> ${data.explanation}
</div>

<div class="tips-box">
    <strong>💡 Smart AI Tips:</strong>
    <ul>
        ${data.suggestions.map(tip => `<li>${tip}</li>`).join("")}
    </ul>
</div>

`;

})

.catch(error =>{
document.getElementById("result").innerHTML = `
<p class="error">Server Error. Please try again.</p>
`;
});

});

</script>

</body>
</html>
